name: Web CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-ci:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
